<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Foot Marker Visualizer</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(25, 25, 30, 0.85);
            --text: #ffffff;
            --accent: rgba(0, 242, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
        }

        #container { width: 100%; height: 100%; }

        /* Glass-morphism UI */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            z-index: 10;
            padding: 25px;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .section { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; opacity: 0.5; letter-spacing: 1px; }

        .toggle-container {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 4px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }

        .btn-import-wrapper { position: relative; width: 100%; }
        .btn-import {
            width: 100%;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .btn-import:hover { background: var(--primary); color: #000; }
        #fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .marker-list-container {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 0.75rem;
            overflow-y: auto;
            border: 1px solid var(--accent);
        }

        .marker-item {
            padding: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
        }
        .coord-val { color: var(--primary); }

        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary);
            font-weight: bold;
            display: none;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--primary);
        }
    </style>
</head>
<body>

    <div id="loader" class="loader">NORMALIZING MODEL...</div>

    <div class="ui-panel">
        <h2>Foot Markers</h2>

        <div class="section">
            <label>MODEL SELECTION</label>
            <div class="toggle-container">
                <button id="leftBtn" class="toggle-btn active" onclick="switchModel('left')">LEFT</button>
                <button id="rightBtn" class="toggle-btn" onclick="switchModel('right')">RIGHT</button>
            </div>
        </div>

        <div class="section">
            <label>IMPORT TEXT DATA</label>
            <div class="btn-import-wrapper">
                <button class="btn-import">Load .txt File</button>
                <input type="file" id="fileInput" accept=".txt">
            </div>
        </div>

        <div class="section" style="flex-grow: 1; display: flex; flex-direction: column;">
            <label>LOADED COORDINATES (<span id="count">0</span>)</label>
            <div id="markerList" class="marker-list-container">
                <div style="opacity: 0.3; text-align: center; margin-top: 20px;">Ready for data...</div>
            </div>
        </div>
    </div>

    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const config = {
            leftUrl: 'https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb',
            rightUrl: 'https://stuart-mcneill.github.io/feet-selection/RightFoot.glb',
            targetHeight: 0.8 // Standardizes both feet to this height in the view
        };

        let scene, camera, renderer, controls, currentModel, markerGroup;
        let activeSide = 'left';
        const loader = new GLTFLoader();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
            camera.position.set(0, 1.2, 2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Matches lighting behavior of your original HTML
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('container').appendChild(renderer.domElement);

            // Synchronized Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const directional = new THREE.DirectionalLight(0xffffff, 1.0);
            directional.position.set(5, 5, 5);
            scene.add(directional);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            markerGroup = new THREE.Group();
            scene.add(markerGroup);

            loadFootModel(config.leftUrl);

            document.getElementById('fileInput').addEventListener('change', handleFileUpload);
            window.addEventListener('resize', onWindowResize);
        }

        function loadFootModel(url) {
            const loaderEl = document.getElementById('loader');
            loaderEl.style.display = 'block';

            if (currentModel) scene.remove(currentModel);
            
            loader.load(url, (gltf) => {
                currentModel = gltf.scene;
                
                // Normalization Logic: Ensure both feet are exactly the same size on screen
                const box = new THREE.Box3().setFromObject(currentModel);
                const size = new THREE.Vector3();
                box.getSize(size);
                
                const scaleFactor = config.targetHeight / size.y;
                currentModel.scale.set(scaleFactor, scaleFactor, scaleFactor);
                
                // Center the model
                const center = new THREE.Vector3();
                box.getCenter(center);
                currentModel.position.x = -center.x * scaleFactor;
                currentModel.position.y = -center.y * scaleFactor;
                currentModel.position.z = -center.z * scaleFactor;
                
                scene.add(currentModel);
                loaderEl.style.display = 'none';
            });
        }

        window.switchModel = function(side) {
            if (activeSide === side) return;
            activeSide = side;
            
            document.getElementById('leftBtn').classList.toggle('active', side === 'left');
            document.getElementById('rightBtn').classList.toggle('active', side === 'right');
            
            loadFootModel(side === 'left' ? config.leftUrl : config.rightUrl);
            markerGroup.clear();
            document.getElementById('markerList').innerHTML = '<div style="opacity: 0.3; text-align: center;">Switched model...</div>';
            document.getElementById('count').innerText = "0";
        };

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => parseFile(e.target.result);
            reader.readAsText(file);
        }

        function parseFile(text) {
            markerGroup.clear();
            const list = document.getElementById('markerList');
            list.innerHTML = '';

            // 1. Intelligent Side Detection
            const content = text.toUpperCase();
            if (content.includes("SIDE: LEFT") || content.includes("LEFT FOOT")) {
                if (activeSide !== 'left') switchModel('left');
            } else if (content.includes("SIDE: RIGHT") || content.includes("RIGHT FOOT")) {
                if (activeSide !== 'right') switchModel('right');
            }

            // 2. Multi-Format Coordinate Parsing
            // This regex captures: [x, y, z] OR Coords: x, y, z
            const regex = /(-?\d+\.\d+),\s*(-?\d+\.\d+),\s*(-?\d+\.\d+)/g;
            let match;
            let count = 0;

            while ((match = regex.exec(text)) !== null) {
                const x = parseFloat(match[1]);
                const y = parseFloat(match[2]);
                const z = parseFloat(match[3]);

                createMarker(x, y, z);
                
                const div = document.createElement('div');
                div.className = 'marker-item';
                div.innerHTML = `<span>#${count + 1}</span><span class="coord-val">${x.toFixed(3)}, ${y.toFixed(3)}, ${z.toFixed(3)}</span>`;
                list.appendChild(div);
                count++;
            }

            document.getElementById('count').innerText = count;
            if (count === 0) list.innerHTML = '<div style="color: #ff4b4b; text-align: center;">No valid coords found.</div>';
        }

        function createMarker(x, y, z) {
            const geometry = new THREE.SphereGeometry(0.006, 16, 16);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xff0000,
                transparent: false
            });
            const sphere = new THREE.Mesh(geometry, material);
            
            // Note: Marker placement uses the coordinate system relative to the model
            // Since we centered the model, markers must be children of the model or calculated.
            // For simplicity and accuracy to your data, we add them to the scene and position them.
            sphere.position.set(x, y, z);
            markerGroup.add(sphere);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Foot Analysis - Import/Export</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0a0c;
            --panel-bg: rgba(25, 25, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: white; }

        #ui-layer { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            display: flex; flex-direction: column; gap: 15px; width: 280px;
            pointer-events: none;
        }

        .panel { 
            background: var(--panel-bg); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 16px; border: 1px solid var(--border); 
            pointer-events: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h2 { margin: 0 0 12px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; }
        .group { display: flex; gap: 8px; margin-bottom: 12px; }

        button { 
            background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--border); 
            padding: 10px; border-radius: 8px; cursor: pointer; font-size: 11px; flex: 1;
            transition: all 0.2s;
        }

        button:hover { background: rgba(255, 255, 255, 0.1); }
        button.active { background: var(--primary); color: #000; font-weight: bold; }
        
        .import-btn { background: #2ecc71; color: white; margin-top: 5px; width: 100%; }
        #coords { font-weight: 500; color: var(--primary); margin-top: 10px; font-size: 13px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="panel">
        <h2>Foot Selection</h2>
        <div class="group">
            <button id="leftBtn">LEFT FOOT</button>
            <button id="rightBtn">RIGHT FOOT</button>
        </div>

        <h2>Interaction Mode</h2>
        <div class="group">
            <button id="rotateBtn" class="active">ROTATE</button>
            <button id="drawBtn">MARK</button>
        </div>

        <h2>Data Management</h2>
        <button id="importBtn" class="import-btn">IMPORT POINTS (.TXT)</button>
        <input type="file" id="fileInput" accept=".txt">
        <button id="downloadBtn" style="margin-top:8px; width:100%;">DOWNLOAD REPORT</button>
        
        <div id="coords">Mode: Rotate</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let scene, camera, renderer, controls, currentModel;
let markerGroup = new THREE.Group();
let mode = 'rotate'; // 'rotate' or 'mark'
let markerLogs = [];

init();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0.5, 1.5);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.AmbientLight(0xffffff, 1);
    scene.add(light);
    scene.add(markerGroup);

    controls = new OrbitControls(camera, renderer.domElement);
    
    window.addEventListener('resize', onResize);
    renderer.domElement.addEventListener('click', handleInteraction);

    // UI Logic
    document.getElementById('leftBtn').onclick = () => loadFoot('left');
    document.getElementById('rightBtn').onclick = () => loadFoot('right');
    document.getElementById('rotateBtn').onclick = () => setMode('rotate');
    document.getElementById('drawBtn').onclick = () => setMode('mark');
    document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = handleImport;
    document.getElementById('downloadBtn').onclick = downloadReport;

    animate();
}

function loadFoot(side) {
    if (currentModel) scene.remove(currentModel);
    markerGroup.clear();
    markerLogs = [];
    
    const loader = new GLTFLoader();
    // Replace with your actual model paths
    const url = side === 'left' ? 'path_to_left_foot.glb' : 'path_to_right_foot.glb';
    
    loader.load(url, (gltf) => {
        currentModel = gltf.scene;
        scene.add(currentModel);
        document.getElementById('coords').textContent = `Loaded: ${side.toUpperCase()}`;
    }, undefined, (err) => {
        console.error("Model path missing. Please update the URL in loadFoot().", err);
    });
}

function setMode(newMode) {
    mode = newMode;
    controls.enabled = (mode === 'rotate');
    document.getElementById('rotateBtn').classList.toggle('active', mode === 'rotate');
    document.getElementById('drawBtn').classList.toggle('active', mode === 'mark');
    document.getElementById('coords').textContent = `Mode: ${mode.toUpperCase()}`;
}

function handleInteraction(event) {
    if (mode !== 'mark' || !currentModel) return;

    const mouse = new THREE.Vector2(
        (event.clientX / window.innerWidth) * 2 - 1,
        -(event.clientY / window.innerHeight) * 2 + 1
    );

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(currentModel, true);

    if (intersects.length > 0) {
        const point = intersects[0].point;
        addMarker(point.x, point.y, point.z, "Manual Point");
    }
}

function addMarker(x, y, z, regionName) {
    const geo = new THREE.SphereGeometry(0.01);
    const mat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
    const marker = new THREE.Mesh(geo, mat);
    marker.position.set(x, y, z);
    markerGroup.add(marker);
    markerLogs.push({ region: regionName, x, y, z });
}

function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        const text = e.target.result;
        markerGroup.clear();
        markerLogs = [];

        // Regex to find: [Region Name] Coords: x, y, z
        const regex = /\[(.*?)\] Coords: ([\d.-]+), ([\d.-]+), ([\d.-]+)/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            const [_, name, x, y, z] = match;
            addMarker(parseFloat(x), parseFloat(y), parseFloat(z), name);
        }
        document.getElementById('coords').textContent = `Imported ${markerLogs.length} points`;
    };
    reader.readAsText(file);
}

function downloadReport() {
    let txt = `FOOT ANALYSIS REPORT\nDate: ${new Date().toLocaleString()}\n\n`;
    markerLogs.forEach((m, i) => {
        txt += `${i + 1}. [${m.region}] Coords: ${m.x.toFixed(4)}, ${m.y.toFixed(4)}, ${m.z.toFixed(4)}\n`;
    });
    const blob = new Blob([txt], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `Foot_Analysis.txt`;
    a.click();
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>

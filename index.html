<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Foot Visualization Tool</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(25, 25, 30, 0.8);
            --text: #ffffff;
            --accent: rgba(0, 242, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
        }

        #container { width: 100%; height: 100%; }

        /* Glass-morphism Panels */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--primary);
            text-transform: uppercase;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 10px;
        }

        .section { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; opacity: 0.6; letter-spacing: 1px; }

        /* Controls */
        .toggle-container {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 4px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #000;
        }

        .btn-import-wrapper {
            position: relative;
            width: 100%;
        }

        .btn-import {
            width: 100%;
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .btn-import:hover {
            background: var(--primary);
            color: #000;
        }

        #fileInput {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        /* Marker List Display */
        .marker-list {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 10px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.7rem;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 10px;
            max-height: 300px;
        }

        .marker-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
        }

        .marker-entry:last-child { border-bottom: none; }
        .m-coord { color: var(--primary); }

        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary);
            font-weight: bold;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader">SYNCHRONIZING SCENE...</div>

    <div class="ui-panel">
        <h2>Foot Visualization</h2>

        <div class="section">
            <label>MODEL SELECTION</label>
            <div class="toggle-container">
                <button id="leftBtn" class="toggle-btn active" onclick="switchModel('left')">LEFT</button>
                <button id="rightBtn" class="toggle-btn" onclick="switchModel('right')">RIGHT</button>
            </div>
        </div>

        <div class="section">
            <label>IMPORT DATA (.TXT)</label>
            <div class="btn-import-wrapper">
                <button class="btn-import">Select Text File</button>
                <input type="file" id="fileInput" accept=".txt">
            </div>
        </div>

        <div class="section">
            <label>IMPORTED COORDINATES</label>
            <div id="statusHeader" style="font-size: 0.8rem; margin-bottom: 5px;">
                Model: <span id="currentModelDisplay" style="color: var(--primary)">Left</span>
            </div>
            <div id="markerList" class="marker-list">
                <div style="opacity: 0.4">No data imported...</div>
            </div>
        </div>
    </div>

    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const models = {
            left: 'https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb',
            right: 'https://stuart-mcneill.github.io/feet-selection/RightFoot.glb'
        };

        let scene, camera, renderer, controls, currentModel, markerGroup;
        let activeSide = 'left';
        const loader = new GLTFLoader();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
            camera.position.set(0, 1.2, 2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // Universal Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            markerGroup = new THREE.Group();
            scene.add(markerGroup);

            loadFootModel(models.left);

            document.getElementById('fileInput').addEventListener('change', handleFileUpload);
            window.addEventListener('resize', onWindowResize);
        }

        function loadFootModel(url) {
            const loaderEl = document.getElementById('loader');
            loaderEl.style.display = 'block';

            if (currentModel) scene.remove(currentModel);
            
            loader.load(url, (gltf) => {
                currentModel = gltf.scene;
                
                // Normalizing scale and position to ensure parity
                currentModel.scale.set(1, 1, 1);
                currentModel.position.set(0, 0, 0);
                
                scene.add(currentModel);
                loaderEl.style.display = 'none';
            });
        }

        window.switchModel = function(side) {
            if (activeSide === side) return;
            activeSide = side;
            
            document.getElementById('leftBtn').classList.toggle('active', side === 'left');
            document.getElementById('rightBtn').classList.toggle('active', side === 'right');
            document.getElementById('currentModelDisplay').innerText = side.charAt(0).toUpperCase() + side.slice(1);
            
            loadFootModel(models[side]);
            markerGroup.clear();
            document.getElementById('markerList').innerHTML = '<div style="opacity: 0.4">Model changed. Reload file if needed.</div>';
        };

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => parseAndPlaceMarkers(e.target.result);
            reader.readAsText(file);
        }

        function parseAndPlaceMarkers(text) {
            markerGroup.clear();
            const listContainer = document.getElementById('markerList');
            listContainer.innerHTML = '';

            const lines = text.split('\n');
            let foundPoints = [];

            // Auto-detection of side
            const upperText = text.toUpperCase();
            if (upperText.includes("SIDE: LEFT") || upperText.includes("LEFT FOOT")) {
                switchModel('left');
            } else if (upperText.includes("SIDE: RIGHT") || upperText.includes("RIGHT FOOT")) {
                switchModel('right');
            }

            lines.forEach((line, index) => {
                // Regex for both "Coords: x, y, z" and "[x, y, z]" formats
                const regex = /(-?\d+\.\d+),\s*(-?\d+\.\d+),\s*(-?\d+\.\d+)/;
                const match = line.match(regex);

                if (match) {
                    const x = parseFloat(match[1]);
                    const y = parseFloat(match[2]);
                    const z = parseFloat(match[3]);

                    createMarker(x, y, z);
                    
                    const entry = document.createElement('div');
                    entry.className = 'marker-entry';
                    entry.innerHTML = `<span>#${foundPoints.length + 1}</span><span class="m-coord">${x}, ${y}, ${z}</span>`;
                    listContainer.appendChild(entry);
                    
                    foundPoints.push({x, y, z});
                }
            });

            if (foundPoints.length === 0) {
                listContainer.innerHTML = '<div style="color: #ff4b4b">No valid coordinates found.</div>';
            }
        }

        function createMarker(x, y, z) {
            const geometry = new THREE.SphereGeometry(0.005, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            markerGroup.add(sphere);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

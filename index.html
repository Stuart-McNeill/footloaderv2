<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Foot Marker Visualizer</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(25, 25, 30, 0.8);
            --text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
        }

        #container {
            width: 100%;
            height: 100%;
        }

        /* Glass-morphism UI */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            padding: 24px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .section {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 15px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #000;
            font-weight: bold;
        }

        /* Import Button */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .btn-import {
            width: 100%;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-import:hover {
            background: var(--primary);
            color: #000;
        }

        #fileInput {
            position: absolute;
            font-size: 100px;
            right: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Status Readout */
        .status-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .status-value {
            color: var(--primary);
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader">LOADING MODEL...</div>

    <div class="ui-panel">
        <h2>Foot Marker Tool</h2>

        <div class="section">
            <label>MODEL SELECTION</label>
            <div class="toggle-container">
                <button id="leftBtn" class="toggle-btn active" onclick="switchModel('left')">LEFT</button>
                <button id="rightBtn" class="toggle-btn" onclick="switchModel('right')">RIGHT</button>
            </div>
        </div>

        <div class="section">
            <label>DATA IMPORT</label>
            <div class="file-input-wrapper">
                <button class="btn-import">Import Text File</button>
                <input type="file" id="fileInput" accept=".txt">
            </div>
        </div>

        <div class="section">
            <label>STATUS</label>
            <div class="status-box">
                <div class="status-item">
                    <span>Side:</span>
                    <span id="statusSide" class="status-value">Left</span>
                </div>
                <div class="status-item">
                    <span>Markers:</span>
                    <span id="statusCount" class="status-value">0</span>
                </div>
            </div>
        </div>
    </div>

    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Configuration
        const models = {
            left: 'https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb',
            right: 'https://stuart-mcneill.github.io/feet-selection/RightFoot.glb'
        };

        let scene, camera, renderer, controls, currentModel, markerGroup;
        let activeSide = 'left';
        const loader = new GLTFLoader();

        init();
        animate();

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
            camera.position.set(0, 1.2, 2);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Marker Group
            markerGroup = new THREE.Group();
            scene.add(markerGroup);

            // Initial Model Load
            loadFootModel(models.left);

            // File Listener
            document.getElementById('fileInput').addEventListener('change', handleFileUpload);

            window.addEventListener('resize', onWindowResize);
        }

        function loadFootModel(url) {
            const loaderEl = document.getElementById('loader');
            loaderEl.style.display = 'block';

            if (currentModel) scene.remove(currentModel);
            
            loader.load(url, (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);
                loaderEl.style.display = 'none';
            }, undefined, (error) => {
                console.error(error);
                loaderEl.innerText = "ERROR LOADING MODEL";
            });
        }

        window.switchModel = function(side) {
            if (activeSide === side) return;
            
            activeSide = side;
            
            // UI Update
            document.getElementById('leftBtn').classList.toggle('active', side === 'left');
            document.getElementById('rightBtn').classList.toggle('active', side === 'right');
            document.getElementById('statusSide').innerText = side.charAt(0).toUpperCase() + side.slice(1);
            
            // Logic Update
            markerGroup.clear();
            document.getElementById('statusCount').innerText = "0";
            loadFootModel(models[side]);
        };

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                parseAndPlaceMarkers(content);
            };
            reader.readAsText(file);
        }

        function parseAndPlaceMarkers(text) {
            // Clear existing
            markerGroup.clear();

            // 1. Auto-detection of side
            const upperText = text.toUpperCase();
            if (upperText.includes("SIDE: LEFT") || upperText.includes("LEFT FOOT -")) {
                switchModel('left');
            } else if (upperText.includes("SIDE: RIGHT") || upperText.includes("RIGHT FOOT -")) {
                switchModel('right');
            }

            // 2. Parse Coordinates
            // Looking for: [Name] Coords: x, y, z
            const lines = text.split('\n');
            let count = 0;

            lines.forEach(line => {
                // Regex to match "Coords: x, y, z" while ignoring the prefix
                const coordRegex = /Coords:\s*(-?\d*\.?\d+),\s*(-?\d*\.?\d+),\s*(-?\d*\.?\d+)/i;
                const match = line.match(coordRegex);

                if (match) {
                    const x = parseFloat(match[1]);
                    const y = parseFloat(match[2]);
                    const z = parseFloat(match[3]);

                    createMarker(x, y, z);
                    count++;
                }
            });

            document.getElementById('statusCount').innerText = count;
        }

        function createMarker(x, y, z) {
            const geometry = new THREE.SphereGeometry(0.005, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            markerGroup.add(sphere);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

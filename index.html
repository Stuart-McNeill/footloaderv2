<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Foot Analysis</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0a0c;
            --panel-bg: rgba(25, 25, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: white; 
        }

        /* Modern Glass UI */
        #ui-layer { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            pointer-events: none; 
            width: 280px;
        }

        .panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            pointer-events: auto; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h2 { 
            margin: 0 0 12px 0; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: #888; 
        }

        .group { display: flex; gap: 8px; margin-bottom: 12px; }

        button { 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            border: 1px solid var(--border); 
            padding: 10px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 500;
            transition: all 0.2s ease; 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(255, 255, 255, 0.3);
        }

        button.active { 
            background: var(--primary); 
            color: #000; 
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        #downloadBtn {
            background: white;
            color: black;
            font-weight: 600;
            margin-top: 5px;
        }

        #downloadBtn:hover {
            background: #eee;
        }

        #status { font-family: monospace; font-size: 10px; color: #555; margin-top: 10px; text-transform: uppercase; }
        #coords { font-weight: 500; color: var(--primary); margin-top: 4px; font-size: 14px; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="panel">
        <h2>Selection</h2>
        <div class="group">
            <button id="leftBtn" class="active">LEFT</button>
            <button id="rightBtn">RIGHT</button>
        </div>

        <h2>Navigation & Tools</h2>
        <div class="group">
            <button id="rotateBtn" class="active">ROTATE</button>
            <button id="drawBtn">MARK</button>
        </div>
        
        <div class="group">
            <button id="undoBtn">UNDO</button>
            <button id="clearMarkersBtn">CLEAR</button>
        </div>

        <button id="downloadBtn">DOWNLOAD REPORT</button>

        <div id="status">System Ready</div>
        <div id="coords">Region: None</div>
    </div>
</div>

    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    scene.add(markerGroup);
    scene.add(boxGroup);

    setupRegions();
    loadModel();

    window.addEventListener('resize', onResize);
    window.addEventListener('click', onClick);

    document.getElementById("leftBtn").onclick = () => switchFoot('left');
    document.getElementById("rightBtn").onclick = () => switchFoot('right');
    document.getElementById("rotateBtn").onclick = () => switchMode('rotate');
    document.getElementById("drawBtn").onclick = () => switchMode('draw');
    document.getElementById("undoBtn").onclick = undoLastMarker;
    document.getElementById("clearMarkersBtn").onclick = clearMarkers;
    document.getElementById("downloadBtn").onclick = downloadReport;
}

function setupRegions() {
    boxGroup.clear();
    PRESET_REGIONS.forEach(reg => {
        const geo = new THREE.BoxGeometry(reg.scale[0], reg.scale[1], reg.scale[2]);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.15, wireframe: true });
        const box = new THREE.Mesh(geo, mat);
        box.position.set(reg.pos[0], reg.pos[1], reg.pos[2]);
        box.rotation.set(reg.rot[0], reg.rot[1], reg.rot[2]);
        box.userData.region = reg.name;
        boxGroup.add(box);
    });
}

function loadModel() {
    document.getElementById("status").textContent = "Loading Model...";
    // Placeholder for actual model loading logic
    document.getElementById("status").textContent = "Model Loaded";
}

function onClick(event) {
    if (currentMode !== 'draw') return;
    
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(boxGroup.children);
    if (intersects.length > 0) {
        const hit = intersects[0];
        const region = hit.object.userData.region;
        const pos = hit.point;
        
        const marker = new THREE.Mesh(
            new THREE.SphereGeometry(0.005),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        marker.position.copy(pos);
        markerGroup.add(marker);
        
        markerLogs.push({ region, x: pos.x.toFixed(3), y: pos.y.toFixed(3), z: pos.z.toFixed(3) });
        document.getElementById("coords").textContent = region.replace(/Left foot - |Right foot - /g, "");
    }
}

function undoLastMarker() {
    if (markerGroup.children.length > 0) {
        markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
        markerLogs.pop();
        const last = markerLogs[markerLogs.length - 1];
        document.getElementById("coords").textContent = last ? last.region.replace(/Left foot - |Right foot - /g, "") : "Region: None";
    }
}

function clearMarkers() {
    markerGroup.clear();
    markerLogs = [];
    document.getElementById("coords").textContent = "Region: None";
}

function downloadReport() {
    if (markerLogs.length === 0) return alert("Please mark the foot before downloading.");
    let txt = `FOOT ANALYSIS REPORT\nSide: ${currentFoot.toUpperCase()}\nDate: ${new Date().toLocaleString()}\n\n`;
    markerLogs.forEach((m, i) => {
        txt += `${i + 1}. [${m.region}] Coords: ${m.x}, ${m.y}, ${m.z}\n`;
    });
    const blob = new Blob([txt], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); 
    a.download = `Foot_Report_${currentFoot}.txt`; 
    a.click();
}

function switchFoot(side) {
    currentFoot = side;
    document.getElementById("leftBtn").classList.toggle("active", side === 'left');
    document.getElementById("rightBtn").classList.toggle("active", side === 'right');
    clearMarkers();
}

function switchMode(mode) {
    currentMode = mode;
    document.getElementById("rotateBtn").classList.toggle("active", mode === 'rotate');
    document.getElementById("drawBtn").classList.toggle("active", mode === 'draw');
    controls.enabled = mode === 'rotate';
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
</script>
</body>
</html>
